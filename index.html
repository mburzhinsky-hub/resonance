<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
  />
  <title>RESONANCE</title>
  <meta name="theme-color" content="#050505" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="RESONANCE" />

  <style>
    :root{
      --bg:#050505;
      --text:#f6f7fb;
      --muted:rgba(255,255,255,.52);
      --soft:rgba(255,255,255,.28);
      --line:rgba(255,255,255,.08);
      --line-strong:rgba(255,255,255,.14);
      --glass:rgba(255,255,255,.04);
      --active:rgba(191,224,255,.95);
      --active-soft:rgba(130,190,255,.18);
      --safe-top:max(18px, env(safe-area-inset-top));
      --safe-bottom:max(18px, env(safe-area-inset-bottom));
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
      user-select:none;
    }

    html,body{
      width:100%;
      height:100%;
      margin:0;
      overflow:hidden;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Inter","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:0;
      background:
        radial-gradient(circle at 50% 30%, rgba(120,170,255,.06), transparent 30%),
        radial-gradient(circle at 50% 84%, rgba(255,255,255,.03), transparent 18%);
    }

    #bgCanvas{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      display:block;
      z-index:0;
    }

    .grain{
      position:fixed;
      inset:0;
      z-index:1;
      pointer-events:none;
      opacity:.045;
      mix-blend-mode:screen;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.18) .6px, transparent .9px),
        radial-gradient(circle at 70% 60%, rgba(255,255,255,.14) .5px, transparent .8px),
        radial-gradient(circle at 40% 80%, rgba(255,255,255,.12) .6px, transparent 1px);
      background-size:180px 180px, 240px 240px, 300px 300px;
    }

    .app{
      position:relative;
      z-index:2;
      width:100%;
      height:100%;
      display:flex;
      flex-direction:column;
      padding:
        calc(var(--safe-top) + 8px)
        22px
        calc(var(--safe-bottom) + 14px);
    }

    .top{
      min-height:48px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .brand{
      font-size:clamp(20px, 4vw, 24px);
      letter-spacing:.22em;
      font-weight:300;
      color:rgba(255,255,255,.9);
    }

    .center{
      flex:1;
      display:grid;
      grid-template-rows:auto auto 1fr auto auto;
      align-items:center;
      min-height:0;
    }

    .orb-area{
      display:flex;
      justify-content:center;
      align-items:center;
      padding-top:6px;
      padding-bottom:8px;
    }

    .orb-shell{
      position:relative;
      width:min(64vw, 300px);
      aspect-ratio:1/1;
      border-radius:50%;
      pointer-events:none;
    }

    .orb-glow,
    .orb-ring,
    .orb-core{
      position:absolute;
      border-radius:50%;
      inset:0;
    }

    .orb-glow{
      background:
        radial-gradient(circle, rgba(220,235,255,.16) 0%, rgba(165,208,255,.07) 36%, transparent 72%);
      filter:blur(28px);
      opacity:.72;
      animation:breathe 7s ease-in-out infinite;
    }

    .orb-ring{
      inset:8%;
      border:1px solid rgba(255,255,255,.08);
      box-shadow:
        inset 0 0 26px rgba(255,255,255,.02),
        0 0 46px rgba(160,210,255,.04);
      opacity:.56;
    }

    .orb-core{
      inset:auto;
      width:12px;
      height:12px;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      background:radial-gradient(circle, #fff 0%, rgba(255,255,255,.9) 36%, rgba(165,212,255,.30) 72%, transparent 100%);
      box-shadow:0 0 24px rgba(210,235,255,.46);
    }

    .meta{
      text-align:center;
      padding:0 10px;
      min-height:70px;
    }

    .title{
      font-size:clamp(34px, 10vw, 58px);
      line-height:1;
      letter-spacing:-.05em;
      color:#fff;
      margin:0 0 8px;
      font-weight:600;
    }

    .subtitle{
      margin:0;
      font-size:14px;
      color:var(--muted);
      letter-spacing:.02em;
    }

    .genres{
      align-self:stretch;
      display:flex;
      flex-direction:column;
      gap:16px;
      justify-content:center;
      padding:4px 0 8px;
    }

    .genre{
      position:relative;
      border:none;
      background:transparent;
      padding:0;
      color:rgba(255,255,255,.28);
      text-align:left;
      font-size:clamp(28px, 8.8vw, 52px);
      line-height:1;
      font-weight:500;
      letter-spacing:-.04em;
      transition:transform .2s ease, color .25s ease, opacity .25s ease;
      cursor:pointer;
    }

    .genre:active{
      transform:scale(.985);
    }

    .genre.active{
      color:#fff;
    }

    .genre-row{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .genre-dot{
      width:10px;
      height:10px;
      border-radius:50%;
      flex:0 0 10px;
      background:transparent;
      box-shadow:none;
      transition:.25s ease;
      margin-top:3px;
    }

    .genre.active .genre-dot{
      background:var(--active);
      box-shadow:
        0 0 0 4px rgba(130,190,255,.05),
        0 0 18px rgba(155,210,255,.35);
    }

    .genre-name{
      display:block;
    }

    .bottom{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:18px;
      padding-top:8px;
    }

    .state{
      min-height:20px;
      text-align:center;
      font-size:14px;
      color:var(--muted);
      letter-spacing:.02em;
    }

    .pause-btn{
      width:96px;
      height:96px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.08);
      background:
        radial-gradient(circle at 50% 35%, rgba(255,255,255,.07), rgba(255,255,255,.02) 55%, rgba(255,255,255,.015));
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.08),
        0 0 0 1px rgba(255,255,255,.02),
        0 12px 34px rgba(0,0,0,.34),
        0 0 28px rgba(170,215,255,.08);
      color:#fff;
      display:grid;
      place-items:center;
      cursor:pointer;
      transition:transform .22s ease, box-shadow .25s ease, opacity .25s ease;
    }

    .pause-btn:active{
      transform:scale(.97);
    }

    .pause-btn.is-idle{
      opacity:.7;
    }

    .home-indicator{
      width:118px;
      height:5px;
      border-radius:999px;
      background:rgba(255,255,255,.34);
      margin-top:2px;
    }

    @keyframes breathe{
      0%,100%{transform:scale(.96); opacity:.54}
      50%{transform:scale(1.06); opacity:.78}
    }

    @media (min-width:720px){
      .app{
        max-width:420px;
        margin:0 auto;
        border-left:1px solid rgba(255,255,255,.035);
        border-right:1px solid rgba(255,255,255,.035);
        box-shadow:0 0 70px rgba(0,0,0,.35);
      }
    }
  </style>
</head>
<body>
  <canvas id="bgCanvas"></canvas>
  <div class="grain"></div>

  <div class="app">
    <div class="top">
      <div class="brand">RESONANCE</div>
    </div>

    <div class="center">
      <div class="orb-area">
        <div class="orb-shell">
          <div class="orb-glow"></div>
          <div class="orb-ring"></div>
          <div class="orb-core"></div>
        </div>
      </div>

      <div class="meta">
        <h1 class="title" id="title">Lo-Fi</h1>
        <p class="subtitle" id="subtitle">Выбери жанр — музыка начнёт играть сразу</p>
      </div>

      <div class="genres" id="genres"></div>

      <div class="bottom">
        <div class="state" id="state">Готово</div>

        <button class="pause-btn is-idle" id="pauseBtn" aria-label="Пауза или воспроизведение">
          <svg id="pauseIcon" width="34" height="34" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M9 6.7v10.6c0 .7.8 1.14 1.4.78l7.9-5.3a.93.93 0 0 0 0-1.56l-7.9-5.3A.93.93 0 0 0 9 6.7Z" fill="currentColor"/>
          </svg>
        </button>

        <div class="home-indicator"></div>
      </div>
    </div>
  </div>

  <audio id="audio" preload="metadata" playsinline></audio>

  <script>
    const APP_NAME = "RESONANCE";

    const GENRES = [
      {
        id: "lofi",
        name: "Lo-Fi",
        sub: "Локальные mp3 рядом с html",
        mode: "local-list",
        tracks: ["./lofi-1.mp3", "./lofi-2.mp3"]
      },
      {
        id: "rap",
        name: "Rap",
        sub: "Радио поток",
        mode: "stream",
        urls: [
          "https://strm112.1.fm/rap_mobile_mp3",
          "https://strm112.1.fm/atr_mobile_mp3"
        ]
      },
      {
        id: "jazz",
        name: "Jazz",
        sub: "Радио поток",
        mode: "stream",
        urls: [
          "https://knkx-live-a.edge.audiocdn.com/6285_128k",
          "https://knkx-live-a.edge.audiocdn.com/6285_64k"
        ]
      },
      {
        id: "Chill",
        name: "Chill",
        sub: "Радио поток",
        mode: "stream",
        urls: [
          "https://ice5.somafm.com/dronezone-128-mp3",
          "https://ice3.somafm.com/dronezone-128-mp3"
        ]
      }
    ];

    const audio = document.getElementById("audio");
    const genresEl = document.getElementById("genres");
    const titleEl = document.getElementById("title");
    const subtitleEl = document.getElementById("subtitle");
    const stateEl = document.getElementById("state");
    const pauseBtn = document.getElementById("pauseBtn");
    const pauseIcon = document.getElementById("pauseIcon");

    const canvas = document.getElementById("bgCanvas");
    const ctx = canvas.getContext("2d", { alpha: true });

    let currentGenre = null;
    let streamAttempt = 0;
    let localTrackIndex = 0;

    let audioCtx = null;
    let analyser = null;
    let spectrum = null;
    let sourceNode = null;
    let usingRealAnalyser = false;
    let fakeEnergy = 0.16;

    const particles = Array.from({ length: 170 }, (_, i) => ({
      a: (Math.PI * 2 * i) / 170,
      r: 0.3 + Math.random() * 0.7,
      o: 0.14 + Math.random() * 0.58,
      s: 0.55 + Math.random() * 1.8,
      d: Math.random() * Math.PI * 2
    }));

    function createManifestAndSW(){
      const iconSVG = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
          <defs>
            <radialGradient id="g" cx="50%" cy="42%" r="72%">
              <stop offset="0%" stop-color="#f7fbff"/>
              <stop offset="28%" stop-color="#bedfff"/>
              <stop offset="58%" stop-color="#182333"/>
              <stop offset="100%" stop-color="#050505"/>
            </radialGradient>
          </defs>
          <rect width="512" height="512" rx="110" fill="#050505"/>
          <circle cx="256" cy="256" r="155" fill="url(#g)" opacity=".95"/>
          <circle cx="256" cy="256" r="118" fill="none" stroke="rgba(255,255,255,.26)" stroke-width="2"/>
          <circle cx="256" cy="256" r="76" fill="none" stroke="rgba(255,255,255,.34)" stroke-width="2"/>
          <circle cx="256" cy="256" r="6" fill="#fff"/>
        </svg>
      `;
      const iconURL = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(iconSVG);

      const manifest = {
        name: APP_NAME,
        short_name: APP_NAME,
        start_url: "./",
        display: "standalone",
        background_color: "#050505",
        theme_color: "#050505",
        icons: [
          { src: iconURL, sizes: "192x192", type: "image/svg+xml", purpose: "any" },
          { src: iconURL, sizes: "512x512", type: "image/svg+xml", purpose: "any" }
        ]
      };

      const manifestBlob = new Blob([JSON.stringify(manifest)], { type: "application/manifest+json" });
      const manifestURL = URL.createObjectURL(manifestBlob);
      const link = document.createElement("link");
      link.rel = "manifest";
      link.href = manifestURL;
      document.head.appendChild(link);

      if ("serviceWorker" in navigator && location.protocol !== "file:") {
        const swCode = `
          const CACHE = 'resonance-minimal-v1';
          self.addEventListener('install', (e) => {
            self.skipWaiting();
            e.waitUntil(caches.open(CACHE).then(cache => cache.addAll(['./']).catch(()=>{})));
          });
          self.addEventListener('activate', (e) => {
            e.waitUntil(self.clients.claim());
          });
          self.addEventListener('fetch', (e) => {
            if (e.request.method !== 'GET') return;
            e.respondWith(
              caches.match(e.request).then((cached) => {
                return cached || fetch(e.request).then((res) => {
                  const copy = res.clone();
                  caches.open(CACHE).then(cache => cache.put(e.request, copy)).catch(()=>{});
                  return res;
                }).catch(() => cached);
              })
            );
          });
        `;
        const swBlob = new Blob([swCode], { type: "text/javascript" });
        const swURL = URL.createObjectURL(swBlob);
        navigator.serviceWorker.register(swURL).catch(() => {});
      }
    }

    function setState(text){
      stateEl.textContent = text;
    }

    function setPlayIcon(paused){
      pauseIcon.innerHTML = paused
        ? '<path d="M9 6.7v10.6c0 .7.8 1.14 1.4.78l7.9-5.3a.93.93 0 0 0 0-1.56l-7.9-5.3A.93.93 0 0 0 9 6.7Z" fill="currentColor"/>'
        : '<path d="M8 6.5v11M16 6.5v11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>';
      pauseBtn.classList.toggle("is-idle", paused);
    }

    function renderGenres(){
      genresEl.innerHTML = "";
      GENRES.forEach((genre) => {
        const button = document.createElement("button");
        button.className = "genre";
        button.dataset.genreId = genre.id;
        button.innerHTML = `
          <span class="genre-row">
            <span class="genre-dot"></span>
            <span class="genre-name">${genre.name}</span>
          </span>
        `;
        button.addEventListener("click", () => selectGenre(genre));
        genresEl.appendChild(button);
      });
    }

    function setActiveGenre(id){
      document.querySelectorAll(".genre").forEach((el) => el.classList.remove("active"));
      const active = document.querySelector(`[data-genre-id="${CSS.escape(id)}"]`);
      if (active) active.classList.add("active");
    }

    async function ensureAudioContext(){
      if (!audioCtx){
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return;

        audioCtx = new AudioCtx();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 1024;
        analyser.smoothingTimeConstant = 0.88;
        spectrum = new Uint8Array(analyser.frequencyBinCount);

        try{
          audio.crossOrigin = "anonymous";
          sourceNode = audioCtx.createMediaElementSource(audio);
          sourceNode.connect(analyser);
          analyser.connect(audioCtx.destination);
          usingRealAnalyser = true;
        }catch(err){
          usingRealAnalyser = false;
        }
      }

      if (audioCtx && audioCtx.state === "suspended") {
        try { await audioCtx.resume(); } catch(e){}
      }
    }

    async function safePlay(){
      try{
        await ensureAudioContext();
        await audio.play();
        setState("Играет");
      }catch(err){
        setState("Нажми ещё раз");
      }
    }

    async function selectGenre(genre){
      currentGenre = genre;
      streamAttempt = 0;
      setActiveGenre(genre.id);
      titleEl.textContent = genre.name;
      subtitleEl.textContent = genre.sub || "";

      if (genre.mode === "local-list") {
        localTrackIndex = 0;
        audio.src = genre.tracks[localTrackIndex];
        audio.load();
        setState("Загрузка…");
        await safePlay();
        updateMediaSession();
        return;
      }

      if (genre.mode === "stream") {
        audio.src = genre.urls[streamAttempt];
        audio.load();
        setState("Подключение…");
        await safePlay();
        updateMediaSession();
      }
    }

    async function retryStream(){
      if (!currentGenre || currentGenre.mode !== "stream") return;
      streamAttempt += 1;

      if (streamAttempt >= currentGenre.urls.length){
        setState("Поток недоступен");
        return;
      }

      audio.src = currentGenre.urls[streamAttempt];
      audio.load();
      setState("Резервный поток…");
      await safePlay();
    }

    async function nextLocalLofi(){
      if (!currentGenre || currentGenre.mode !== "local-list") return;
      localTrackIndex = (localTrackIndex + 1) % currentGenre.tracks.length;
      audio.src = currentGenre.tracks[localTrackIndex];
      audio.load();
      await safePlay();
      updateMediaSession();
    }

    async function togglePause(){
      if (!audio.src){
        await selectGenre(GENRES[0]);
        return;
      }

      if (audio.paused) await safePlay();
      else audio.pause();
    }

    pauseBtn.addEventListener("click", togglePause);

    audio.addEventListener("play", () => {
      setPlayIcon(false);
      updateMediaSessionPlayback();
      setState("Играет");
    });

    audio.addEventListener("pause", () => {
      setPlayIcon(true);
      updateMediaSessionPlayback();
      setState("Пауза");
    });

    audio.addEventListener("waiting", () => {
      if (!audio.paused) setState("Загрузка…");
    });

    audio.addEventListener("playing", () => {
      setState("Играет");
    });

    audio.addEventListener("ended", async () => {
      if (currentGenre?.mode === "local-list") {
        await nextLocalLofi();
      }
    });

    audio.addEventListener("error", async () => {
      if (currentGenre?.mode === "stream") {
        await retryStream();
      } else {
        setState("Не удалось открыть mp3");
      }
    });

    function createArtworkDataURL(text){
      const safe = String(text || APP_NAME).slice(0, 22);
      return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
          <defs>
            <radialGradient id="g" cx="50%" cy="42%" r="72%">
              <stop offset="0%" stop-color="#f9fdff"/>
              <stop offset="24%" stop-color="#cde5ff"/>
              <stop offset="57%" stop-color="#172335"/>
              <stop offset="100%" stop-color="#050505"/>
            </radialGradient>
          </defs>
          <rect width="512" height="512" rx="96" fill="#050505"/>
          <circle cx="256" cy="232" r="150" fill="url(#g)"/>
          <circle cx="256" cy="232" r="105" fill="none" stroke="rgba(255,255,255,.24)" stroke-width="2"/>
          <circle cx="256" cy="232" r="64" fill="none" stroke="rgba(255,255,255,.28)" stroke-width="2"/>
          <circle cx="256" cy="232" r="6" fill="#fff"/>
          <text x="256" y="430" text-anchor="middle" fill="rgba(255,255,255,.88)" font-family="Arial, Helvetica, sans-serif" font-size="28" letter-spacing="5">${safe}</text>
        </svg>
      `);
    }

    function updateMediaSession(){
      if (!("mediaSession" in navigator)) return;

      navigator.mediaSession.metadata = new MediaMetadata({
        title: titleEl.textContent || APP_NAME,
        artist: subtitleEl.textContent || "",
        album: APP_NAME,
        artwork: [{
          src: createArtworkDataURL(titleEl.textContent || APP_NAME),
          sizes: "512x512",
          type: "image/svg+xml"
        }]
      });

      navigator.mediaSession.setActionHandler("play", async () => { await safePlay(); });
      navigator.mediaSession.setActionHandler("pause", () => audio.pause());
      navigator.mediaSession.setActionHandler("nexttrack", null);
      navigator.mediaSession.setActionHandler("previoustrack", null);

      updateMediaSessionPlayback();
    }

    function updateMediaSessionPlayback(){
      if ("mediaSession" in navigator) {
        navigator.mediaSession.playbackState = audio.paused ? "paused" : "playing";
      }
    }

    function resizeCanvas(){
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.floor(innerWidth * dpr);
      canvas.height = Math.floor(innerHeight * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    function getSpectrum(){
      if (usingRealAnalyser && analyser && spectrum){
        try{
          analyser.getByteFrequencyData(spectrum);
          return spectrum;
        }catch(e){}
      }
      return null;
    }

    function getEnergy(){
      const arr = getSpectrum();

      if (arr){
        let bass = 0, mid = 0, high = 0;
        const len = arr.length;
        const bassEnd = Math.floor(len * 0.08);
        const midEnd = Math.floor(len * 0.35);

        for (let i = 0; i < bassEnd; i++) bass += arr[i];
        for (let i = bassEnd; i < midEnd; i++) mid += arr[i];
        for (let i = midEnd; i < len; i++) high += arr[i];

        bass /= Math.max(1, bassEnd * 255);
        mid /= Math.max(1, (midEnd - bassEnd) * 255);
        high /= Math.max(1, (len - midEnd) * 255);

        return {
          bass: bass || 0.02,
          mid: mid || 0.02,
          high: high || 0.02,
          overall: (bass * 1.35 + mid + high * .8) / 3.15
        };
      }

      const t = performance.now() * 0.001;
      const playBoost = !audio.paused && audio.src ? 1 : 0;
      fakeEnergy += (((0.15 + Math.sin(t * 1.2) * 0.05 + Math.sin(t * 2.7) * 0.03) + playBoost * 0.12) - fakeEnergy) * 0.05;

      return {
        bass: Math.max(0.05, fakeEnergy + Math.sin(t * 1.7) * 0.04),
        mid: Math.max(0.05, fakeEnergy * 0.8 + Math.sin(t * 2.1) * 0.05),
        high: Math.max(0.05, fakeEnergy * 0.55 + Math.cos(t * 2.9) * 0.04),
        overall: Math.max(0.05, fakeEnergy)
      };
    }

    function drawBackground(time){
      const t = time * 0.001;
      const w = innerWidth;
      const h = innerHeight;
      ctx.clearRect(0, 0, w, h);

      const e = getEnergy();
      const cx = w * 0.5;
      const cy = h * 0.30;
      const bass = e.bass;
      const mid = e.mid;
      const high = e.high;
      const overall = e.overall;
      const baseR = Math.min(w, h) * 0.15;
      const glowR = baseR * (1.95 + bass * 1.4);

      const bgGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(w, h) * 0.92);
      bgGrad.addColorStop(0, `rgba(${Math.floor(162 + bass * 65)}, ${Math.floor(194 + mid * 34)}, 255, ${0.05 + overall * 0.16})`);
      bgGrad.addColorStop(.2, `rgba(110,150,255,${0.04 + overall * 0.08})`);
      bgGrad.addColorStop(.58, `rgba(20,26,42,.06)`);
      bgGrad.addColorStop(1, `rgba(5,5,5,1)`);
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, w, h);

      const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowR);
      glow.addColorStop(0, `rgba(255,255,255,${0.14 + overall * 0.16})`);
      glow.addColorStop(.22, `rgba(170,210,255,${0.10 + mid * 0.11})`);
      glow.addColorStop(.55, `rgba(95,135,255,${0.05 + high * 0.07})`);
      glow.addColorStop(1, `rgba(95,135,255,0)`);
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(cx, cy, glowR, 0, Math.PI * 2);
      ctx.fill();

      ctx.save();
      ctx.translate(cx, cy);

      for (let layer = 0; layer < 3; layer++){
        ctx.beginPath();
        const alpha = 0.04 + layer * 0.018 + overall * 0.028;
        const phase = t * (0.12 + layer * 0.06);

        for (let i = 0; i <= 200; i++){
          const a = (i / 200) * Math.PI * 2;
          const noise =
            Math.sin(a * (3 + layer) + phase * 1.4) * bass * 17 +
            Math.cos(a * (6 + layer * 1.4) - phase * 1.8) * high * 9 +
            Math.sin(a * 10 + phase * 2.1) * mid * 6;

          const r = baseR + layer * 7 + noise;
          const x = Math.cos(a) * r;
          const y = Math.sin(a) * r * (0.9 + layer * 0.015);

          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }

        ctx.closePath();
        ctx.strokeStyle = `rgba(235,244,255,${alpha})`;
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      particles.forEach((p, i) => {
        const phase = t * (0.2 + p.s * 0.09) + p.d;
        const wave = Math.sin(phase * 1.6 + p.a * 2.8) * (11 + high * 26);
        const radial = baseR * (0.58 + p.r * 0.68) + wave + bass * 13;
        const twist = t * (0.06 + p.s * 0.012);
        const x = Math.cos(p.a + twist) * radial;
        const y = Math.sin(p.a + twist) * radial * (0.92 + Math.sin(phase) * 0.04);
        const size = 0.75 + p.s * 0.8 + overall * 1.08;
        const alpha = p.o * (0.42 + overall * 0.9);

        ctx.beginPath();
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fill();

        if (i % 4 === 0){
          ctx.beginPath();
          ctx.moveTo(x, y);
          ctx.lineTo(x * 0.74, y * 0.74);
          ctx.strokeStyle = `rgba(220,235,255,${alpha * 0.3})`;
          ctx.lineWidth = 0.7;
          ctx.stroke();
        }
      });

      const core = ctx.createRadialGradient(0, 0, 0, 0, 0, baseR * 0.24);
      core.addColorStop(0, `rgba(255,255,255,.93)`);
      core.addColorStop(.28, `rgba(245,250,255,${0.48 + overall * .24})`);
      core.addColorStop(.65, `rgba(190,220,255,${0.18 + bass * .13})`);
      core.addColorStop(1, `rgba(190,220,255,0)`);
      ctx.fillStyle = core;
      ctx.beginPath();
      ctx.arc(0, 0, baseR * 0.24, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();

      requestAnimationFrame(drawBackground);
    }

    function initWarmup(){
      ["touchstart", "click"].forEach((evt) => {
        window.addEventListener(evt, async () => {
          if (!audioCtx) {
            try { await ensureAudioContext(); } catch(e){}
          }
        }, { once:true, passive:true });
      });
    }

    function init(){
      createManifestAndSW();
      renderGenres();
      setPlayIcon(true);
      setState("Готово");
      requestAnimationFrame(drawBackground);
      initWarmup();
    }

    init();
  </script>
</body>
