<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>RESONANCE</title>
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="RESONANCE" />

  <style>
    :root{
      --bg:#000000;
      --text:#ffffff;
      --muted:rgba(255,255,255,.24);
      --accent:#35b8ff;
      --safe-top:max(14px, env(safe-area-inset-top));
      --safe-bottom:max(18px, env(safe-area-inset-bottom));
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
      user-select:none;
      -webkit-user-select:none;
    }

    html,body{
      width:100%;
      height:100%;
      margin:0;
      overflow:hidden;
      background:#000;
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Inter","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    }

    body{
      position:relative;
      background:#000;
    }

    #bgCanvas{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      display:block;
      z-index:0;
    }

    .app{
      position:relative;
      z-index:2;
      width:100%;
      height:100%;
      display:flex;
      justify-content:center;
      align-items:stretch;
      background:transparent;
    }

    .phone{
      width:100%;
      max-width:430px;
      height:100%;
      padding:
        calc(var(--safe-top) + 8px)
        28px
        calc(var(--safe-bottom) + 14px);
      display:flex;
      flex-direction:column;
      background:#000;
      overflow:hidden;
    }

    .top{
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:72px;
      padding-top:6px;
    }

    .logo{
      font-size:clamp(18px, 4vw, 24px);
      font-weight:300;
      letter-spacing:.28em;
      color:rgba(255,255,255,.84);
      transition:opacity .28s ease, text-shadow .28s ease;
    }

    .logo.playing{
      animation:logoPulse 2.2s ease-in-out infinite;
    }

    .content{
      flex:1;
      display:flex;
      flex-direction:column;
      min-height:0;
      position:relative;
    }

    .spacer-top{
      height:10vh;
      min-height:46px;
    }

    .genres{
      display:flex;
      flex-direction:column;
      gap:18px;
      align-items:flex-start;
      padding-left:2px;
      margin-top:8px;
      position:relative;
      z-index:2;
    }

    .genre{
      border:none;
      background:transparent;
      color:var(--muted);
      padding:0;
      cursor:pointer;
      text-align:left;
      transition:transform .18s ease, color .22s ease;
    }

    .genre:active{
      transform:scale(.985);
    }

    .genre.active{
      color:#fff;
    }

    .genre-row{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .genre-dot{
      width:9px;
      height:9px;
      flex:0 0 9px;
      border-radius:50%;
      background:transparent;
      box-shadow:none;
      transition:.24s ease;
      margin-top:4px;
    }

    .genre.active .genre-dot{
      background:var(--accent);
      box-shadow:
        0 0 12px rgba(53,184,255,.95),
        0 0 24px rgba(53,184,255,.35);
    }

    .genre-name{
      font-size:clamp(34px, 10vw, 58px);
      line-height:1;
      font-weight:600;
      letter-spacing:-.06em;
    }

    .bottom{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-end;
      gap:22px;
      padding-bottom:2px;
      flex:1;
      position:relative;
      z-index:2;
    }

    .pause-btn{
      width:98px;
      height:98px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.12);
      background:
        radial-gradient(circle at 50% 34%, rgba(255,255,255,.08), rgba(255,255,255,.02) 56%, rgba(255,255,255,.01));
      color:#fff;
      display:grid;
      place-items:center;
      cursor:pointer;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.08),
        0 0 0 1px rgba(255,255,255,.02),
        0 12px 30px rgba(0,0,0,.40),
        0 0 30px rgba(118,188,255,.10);
      transition:transform .2s ease, opacity .24s ease, box-shadow .24s ease;
      opacity:.82;
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
    }

    .pause-btn:active{
      transform:scale(.97);
    }

    .pause-btn.playing{
      opacity:1;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.10),
        0 0 0 1px rgba(255,255,255,.02),
        0 14px 34px rgba(0,0,0,.42),
        0 0 34px rgba(118,188,255,.14);
    }

    .home-indicator{
      width:118px;
      height:5px;
      border-radius:999px;
      background:rgba(255,255,255,.28);
    }

    @keyframes logoPulse{
      0%,100%{
        opacity:.78;
        text-shadow:0 0 0 rgba(255,255,255,0);
      }
      50%{
        opacity:1;
        text-shadow:
          0 0 10px rgba(255,255,255,.22),
          0 0 24px rgba(53,184,255,.10);
      }
    }

    @media (min-width:431px){
      .phone{
        box-shadow:0 0 60px rgba(0,0,0,.35);
      }
    }
  </style>
</head>
<body>
  <canvas id="bgCanvas"></canvas>

  <div class="app">
    <div class="phone">
      <div class="top">
        <div class="logo" id="logo">RESONANCE</div>
      </div>

      <div class="content">
        <div class="spacer-top"></div>

        <div class="genres" id="genres"></div>

        <div class="bottom">
          <button class="pause-btn" id="pauseBtn" aria-label="Пауза или воспроизведение">
            <svg id="pauseIcon" width="34" height="34" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M9 6.7v10.6c0 .7.8 1.14 1.4.78l7.9-5.3a.93.93 0 0 0 0-1.56l-7.9-5.3A.93.93 0 0 0 9 6.7Z" fill="currentColor"/>
            </svg>
          </button>

          <div class="home-indicator"></div>
        </div>
      </div>
    </div>
  </div>

  <audio id="audio" preload="metadata" playsinline webkit-playsinline></audio>

  <script>
    const APP_NAME = "RESONANCE";

    const GENRES = [
      {
        id: "lofi",
        name: "Lo-Fi",
        mode: "local-list",
        tracks: ["./lofi-1.mp3", "./lofi-2.mp3"]
      },
      {
        id: "rap",
        name: "Rap",
        mode: "local-list",
        tracks: ["./rap-1.mp3", "./rap-2.mp3"]
      },
      {
        id: "jazz",
        name: "Jazz",
        mode: "stream",
        urls: [
          "https://knkx-live-a.edge.audiocdn.com/6285_128k",
          "https://knkx-live-a.edge.audiocdn.com/6285_64k"
        ]
      },
      {
        id: "chill",
        name: "Chill",
        mode: "stream",
        urls: [
          "https://ice5.somafm.com/dronezone-128-mp3",
          "https://ice3.somafm.com/dronezone-128-mp3"
        ]
      }
    ];

    const audio = document.getElementById("audio");
    const genresEl = document.getElementById("genres");
    const pauseBtn = document.getElementById("pauseBtn");
    const pauseIcon = document.getElementById("pauseIcon");
    const logo = document.getElementById("logo");
    const canvas = document.getElementById("bgCanvas");
    const ctx = canvas.getContext("2d", { alpha: true });

    let currentGenre = null;
    let currentLocalIndex = 0;
    let currentStreamIndex = 0;

    let audioCtx = null;
    let analyser = null;
    let spectrum = null;
    let sourceNode = null;
    let usingRealAnalyser = false;
    let fakeEnergy = 0.05;
    let rightGlowLevel = 0;

    const stars = Array.from({ length: 18 }, () => ({
      x: 0.86 + Math.random() * 0.12,
      y: Math.random(),
      r: Math.random() * 1.4 + 0.4,
      a: Math.random() * .25 + .08
    }));

    function createManifestAndSW(){
      const iconSVG = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
          <rect width="512" height="512" rx="110" fill="#000"/>
          <text x="256" y="278" text-anchor="middle" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="46" letter-spacing="10">R</text>
        </svg>
      `;
      const iconURL = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(iconSVG);

      const manifest = {
        name: APP_NAME,
        short_name: APP_NAME,
        start_url: "./",
        display: "standalone",
        background_color: "#000000",
        theme_color: "#000000",
        icons: [
          { src: iconURL, sizes: "192x192", type: "image/svg+xml", purpose: "any" },
          { src: iconURL, sizes: "512x512", type: "image/svg+xml", purpose: "any" }
        ]
      };

      const manifestBlob = new Blob([JSON.stringify(manifest)], { type: "application/manifest+json" });
      const manifestURL = URL.createObjectURL(manifestBlob);
      const link = document.createElement("link");
      link.rel = "manifest";
      link.href = manifestURL;
      document.head.appendChild(link);

      if ("serviceWorker" in navigator && location.protocol !== "file:") {
        const swCode = `
          const CACHE = 'resonance-black-v3';
          self.addEventListener('install', (e) => {
            self.skipWaiting();
            e.waitUntil(caches.open(CACHE).then(cache => cache.addAll(['./']).catch(()=>{})));
          });
          self.addEventListener('activate', (e) => {
            e.waitUntil(self.clients.claim());
          });
          self.addEventListener('fetch', (e) => {
            if (e.request.method !== 'GET') return;
            e.respondWith(
              caches.match(e.request).then((cached) => cached || fetch(e.request))
            );
          });
        `;
        const swBlob = new Blob([swCode], { type: "text/javascript" });
        const swURL = URL.createObjectURL(swBlob);
        navigator.serviceWorker.register(swURL).catch(() => {});
      }
    }

    function setPlayIcon(paused){
      pauseIcon.innerHTML = paused
        ? '<path d="M9 6.7v10.6c0 .7.8 1.14 1.4.78l7.9-5.3a.93.93 0 0 0 0-1.56l-7.9-5.3A.93.93 0 0 0 9 6.7Z" fill="currentColor"/>'
        : '<path d="M8 6.5v11M16 6.5v11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>';
      pauseBtn.classList.toggle("playing", !paused);
      logo.classList.toggle("playing", !paused);
    }

    function renderGenres(){
      genresEl.innerHTML = "";
      GENRES.forEach((genre) => {
        const button = document.createElement("button");
        button.className = "genre";
        button.dataset.genreId = genre.id;
        button.innerHTML = `
          <span class="genre-row">
            <span class="genre-dot"></span>
            <span class="genre-name">${genre.name}</span>
          </span>
        `;
        button.addEventListener("click", () => selectGenre(genre));
        genresEl.appendChild(button);
      });
    }

    function setActiveGenre(id){
      document.querySelectorAll(".genre").forEach(el => el.classList.remove("active"));
      const active = document.querySelector(`[data-genre-id="${CSS.escape(id)}"]`);
      if (active) active.classList.add("active");
    }

    async function ensureAudioContext(){
      if (!audioCtx){
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return;

        audioCtx = new AudioCtx();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 1024;
        analyser.smoothingTimeConstant = 0.88;
        spectrum = new Uint8Array(analyser.frequencyBinCount);

        try{
          audio.crossOrigin = "anonymous";
          sourceNode = audioCtx.createMediaElementSource(audio);
          sourceNode.connect(analyser);
          analyser.connect(audioCtx.destination);
          usingRealAnalyser = true;
        }catch(err){
          usingRealAnalyser = false;
        }
      }

      if (audioCtx.state === "suspended") {
        try { await audioCtx.resume(); } catch(e){}
      }
    }

    async function safePlay(){
      try{
        await ensureAudioContext();
        await audio.play();
      }catch(e){}
    }

    async function selectGenre(genre){
      currentGenre = genre;
      setActiveGenre(genre.id);

      if (genre.mode === "local-list") {
        currentLocalIndex = 0;
        audio.src = genre.tracks[currentLocalIndex];
        audio.load();
        await safePlay();
        updateMediaSession();
        return;
      }

      currentStreamIndex = 0;
      audio.src = genre.urls[currentStreamIndex];
      audio.load();
      await safePlay();
      updateMediaSession();
    }

    async function nextLocal(){
      if (!currentGenre || currentGenre.mode !== "local-list") return;
      currentLocalIndex = (currentLocalIndex + 1) % currentGenre.tracks.length;
      audio.src = currentGenre.tracks[currentLocalIndex];
      audio.load();
      await safePlay();
      updateMediaSession();
    }

    async function retryStream(){
      if (!currentGenre || currentGenre.mode !== "stream") return;
      currentStreamIndex += 1;
      if (currentStreamIndex >= currentGenre.urls.length) return;
      audio.src = currentGenre.urls[currentStreamIndex];
      audio.load();
      await safePlay();
      updateMediaSession();
    }

    async function togglePlayback(){
      if (!audio.src){
        await selectGenre(GENRES[0]);
        return;
      }

      if (audio.paused) await safePlay();
      else audio.pause();
    }

    pauseBtn.addEventListener("click", togglePlayback);

    audio.addEventListener("play", () => {
      setPlayIcon(false);
      updateMediaSessionPlayback();
    });

    audio.addEventListener("pause", () => {
      setPlayIcon(true);
      updateMediaSessionPlayback();
    });

    audio.addEventListener("ended", async () => {
      if (currentGenre?.mode === "local-list") await nextLocal();
    });

    audio.addEventListener("error", async () => {
      if (currentGenre?.mode === "stream") await retryStream();
    });

    function createArtworkDataURL(text){
      const safe = String(text || APP_NAME).slice(0, 24);
      return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
          <rect width="512" height="512" rx="96" fill="#000"/>
          <text x="256" y="270" text-anchor="middle" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="42" letter-spacing="10">${safe}</text>
        </svg>
      `);
    }

    function updateMediaSession(){
      if (!("mediaSession" in navigator)) return;

      navigator.mediaSession.metadata = new MediaMetadata({
        title: currentGenre?.name || APP_NAME,
        artist: APP_NAME,
        album: APP_NAME,
        artwork: [{
          src: createArtworkDataURL(currentGenre?.name || APP_NAME),
          sizes: "512x512",
          type: "image/svg+xml"
        }]
      });

      navigator.mediaSession.setActionHandler("play", async () => { await safePlay(); });
      navigator.mediaSession.setActionHandler("pause", () => audio.pause());
      navigator.mediaSession.setActionHandler("nexttrack", null);
      navigator.mediaSession.setActionHandler("previoustrack", null);

      updateMediaSessionPlayback();
    }

    function updateMediaSessionPlayback(){
      if ("mediaSession" in navigator) {
        navigator.mediaSession.playbackState = audio.paused ? "paused" : "playing";
      }
    }

    function resizeCanvas(){
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.floor(innerWidth * dpr);
      canvas.height = Math.floor(innerHeight * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    function getEnergy(){
      if (usingRealAnalyser && analyser && spectrum){
        try{
          analyser.getByteFrequencyData(spectrum);
          let bass = 0;
          const end = Math.floor(spectrum.length * 0.12);
          for (let i = 0; i < end; i++) bass += spectrum[i];
          bass /= Math.max(1, end * 255);
          return Math.max(0.02, bass);
        }catch(e){}
      }

      const t = performance.now() * 0.001;
      const boost = !audio.paused && audio.src ? .16 : 0;
      fakeEnergy += (((0.02 + Math.sin(t * 1.4) * 0.015) + boost) - fakeEnergy) * 0.05;
      return Math.max(0.02, fakeEnergy);
    }

    function drawBackground(time){
      const t = time * 0.001;
      const w = innerWidth;
      const h = innerHeight;
      ctx.clearRect(0, 0, w, h);

      const e = getEnergy();
      const activeId = currentGenre?.id || "lofi";
      const lofiActive = activeId === "lofi";
      const rapActive = activeId === "rap";

      let targetGlow;
      if (lofiActive) {
        targetGlow = 0.20 + e * 0.85 + (Math.sin(t * 5.2) * 0.08 + 0.08);
      } else if (rapActive) {
        targetGlow = 0.18 + e * 0.65 + (Math.sin(t * 4.4) * 0.05 + 0.05);
      } else {
        targetGlow = 0.015 + e * 0.06;
      }

      rightGlowLevel += (targetGlow - rightGlowLevel) * 0.08;

      const bandX = w * 0.985;
      const bandWidth = Math.max(18, w * 0.022);

      const bandGlow = ctx.createLinearGradient(bandX - bandWidth * 4, 0, bandX, 0);
      if (lofiActive) {
        bandGlow.addColorStop(0, "rgba(53,184,255,0)");
        bandGlow.addColorStop(0.55, `rgba(53,184,255,${rightGlowLevel * 0.22})`);
        bandGlow.addColorStop(0.82, `rgba(53,184,255,${rightGlowLevel * 0.75})`);
        bandGlow.addColorStop(1, `rgba(160,225,255,${Math.min(1, rightGlowLevel * 1.15)})`);
      } else if (rapActive) {
        bandGlow.addColorStop(0, "rgba(255,255,255,0)");
        bandGlow.addColorStop(0.45, `rgba(130,130,130,${rightGlowLevel * 0.20})`);
        bandGlow.addColorStop(0.75, `rgba(170,170,170,${rightGlowLevel * 0.55})`);
        bandGlow.addColorStop(1, `rgba(235,235,235,${Math.min(1, rightGlowLevel * 0.95)})`);
      } else {
        bandGlow.addColorStop(0, "rgba(255,255,255,0)");
        bandGlow.addColorStop(0.65, `rgba(120,120,120,${rightGlowLevel * 0.12})`);
        bandGlow.addColorStop(1, `rgba(180,180,180,${rightGlowLevel * 0.25})`);
      }

      ctx.fillStyle = bandGlow;
      ctx.fillRect(w - bandWidth * 6, 0, bandWidth * 6, h);

      const centerGlow = ctx.createRadialGradient(w * 0.985, h * 0.5, 0, w * 0.985, h * 0.5, Math.min(w, h) * 0.23);
      if (lofiActive) {
        centerGlow.addColorStop(0, `rgba(160,225,255,${rightGlowLevel * 0.55})`);
        centerGlow.addColorStop(.25, `rgba(53,184,255,${rightGlowLevel * 0.28})`);
        centerGlow.addColorStop(1, "rgba(53,184,255,0)");
      } else if (rapActive) {
        centerGlow.addColorStop(0, `rgba(245,245,245,${rightGlowLevel * 0.40})`);
        centerGlow.addColorStop(.25, `rgba(150,150,150,${rightGlowLevel * 0.24})`);
        centerGlow.addColorStop(1, "rgba(150,150,150,0)");
      } else {
        centerGlow.addColorStop(0, `rgba(215,215,215,${rightGlowLevel * 0.14})`);
        centerGlow.addColorStop(1, "rgba(150,150,150,0)");
      }
      ctx.fillStyle = centerGlow;
      ctx.fillRect(w - Math.min(w, h) * 0.28, h * 0.18, Math.min(w, h) * 0.28, h * 0.64);

      const bottomGlow = ctx.createRadialGradient(w * .5, h * .88, 0, w * .5, h * .88, Math.min(w, h) * .22);
      if (rapActive) {
        bottomGlow.addColorStop(0, `rgba(200,200,200,${0.02 + e * .12})`);
        bottomGlow.addColorStop(1, "rgba(200,200,200,0)");
      } else {
        bottomGlow.addColorStop(0, `rgba(118,188,255,${0.03 + e * .18})`);
        bottomGlow.addColorStop(1, "rgba(118,188,255,0)");
      }
      ctx.fillStyle = bottomGlow;
      ctx.fillRect(0, 0, w, h);

      for (const s of stars){
        ctx.beginPath();
        const starAlphaBase = rapActive ? 0.65 : 0.45;
        ctx.fillStyle = `rgba(255,255,255,${s.a * (starAlphaBase + rightGlowLevel * 0.5)})`;
        ctx.arc(s.x * w, s.y * h, s.r, 0, Math.PI * 2);
        ctx.fill();
      }

      if (lofiActive || rapActive){
        const x = w * 0.962;
        const y = h * 0.51;
        const pulse = 18 + e * 34 + Math.sin(t * (rapActive ? 5.1 : 6.4)) * 4;

        const dotGlow = ctx.createRadialGradient(x, y, 0, x, y, pulse);
        if (lofiActive) {
          dotGlow.addColorStop(0, `rgba(180,232,255,${rightGlowLevel * 0.95})`);
          dotGlow.addColorStop(.38, `rgba(53,184,255,${rightGlowLevel * 0.38})`);
          dotGlow.addColorStop(1, "rgba(53,184,255,0)");
        } else {
          dotGlow.addColorStop(0, `rgba(245,245,245,${rightGlowLevel * 0.75})`);
          dotGlow.addColorStop(.38, `rgba(160,160,160,${rightGlowLevel * 0.30})`);
          dotGlow.addColorStop(1, "rgba(160,160,160,0)");
        }
        ctx.fillStyle = dotGlow;
        ctx.beginPath();
        ctx.arc(x, y, pulse, 0, Math.PI * 2);
        ctx.fill();
      }

      requestAnimationFrame(drawBackground);
    }

    function initWarmup(){
      ["touchstart", "click"].forEach((evt) => {
        window.addEventListener(evt, async () => {
          if (!audioCtx) {
            try { await ensureAudioContext(); } catch(e){}
          }
        }, { once:true, passive:true });
      });
    }

    function init(){
      createManifestAndSW();
      renderGenres();
      setPlayIcon(true);
      setActiveGenre("lofi");
      currentGenre = GENRES[0];
      requestAnimationFrame(drawBackground);
      initWarmup();
    }

    init();
  </script>
</body>
</html>
