<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
  />
  <title>RESONANCE</title>
  <meta name="theme-color" content="#050505" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="RESONANCE" />

  <style>
    :root{
      --bg:#050505;
      --bg-soft:rgba(255,255,255,.04);
      --glass:rgba(255,255,255,.06);
      --glass-strong:rgba(255,255,255,.10);
      --line:rgba(255,255,255,.10);
      --line-strong:rgba(255,255,255,.18);
      --text:#f6f7fb;
      --muted:rgba(255,255,255,.58);
      --soft:rgba(255,255,255,.34);
      --accent:#dff0ff;
      --accent-2:#9ecfff;
      --safe-top:max(18px, env(safe-area-inset-top));
      --safe-bottom:max(16px, env(safe-area-inset-bottom));
      --shadow:0 20px 60px rgba(0,0,0,.42);
      --radius:28px;
      --radius-sm:18px;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      margin:0;
      width:100%;
      height:100%;
      background:var(--bg);
      color:var(--text);
      overflow:hidden;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Inter","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      touch-action:manipulation;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      z-index:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 18% 18%, rgba(135,175,255,.08), transparent 28%),
        radial-gradient(circle at 82% 25%, rgba(255,255,255,.05), transparent 22%),
        radial-gradient(circle at 50% 78%, rgba(118,178,255,.06), transparent 34%);
    }

    #bgCanvas{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      display:block;
      z-index:0;
    }

    .noise{
      position:fixed;
      inset:0;
      z-index:1;
      pointer-events:none;
      opacity:.05;
      mix-blend-mode:screen;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.18) .6px, transparent .9px),
        radial-gradient(circle at 70% 60%, rgba(255,255,255,.14) .5px, transparent .8px),
        radial-gradient(circle at 40% 80%, rgba(255,255,255,.12) .6px, transparent 1px);
      background-size:180px 180px, 240px 240px, 300px 300px;
    }

    .app{
      position:relative;
      z-index:2;
      width:100%;
      height:100%;
      overflow:hidden;
    }

    .scroll{
      position:absolute;
      inset:0;
      overflow:auto;
      padding:
        calc(var(--safe-top) + 10px)
        18px
        calc(215px + var(--safe-bottom))
        18px;
      scrollbar-width:none;
    }

    .scroll::-webkit-scrollbar{
      display:none;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
    }

    .top-pill{
      width:36px;
      height:36px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
    }

    .brand{
      flex:1;
      text-align:center;
      font-size:clamp(30px, 8vw, 42px);
      letter-spacing:.14em;
      font-weight:300;
      color:rgba(255,255,255,.96);
    }

    .hero{
      position:relative;
      height:min(40vh, 360px);
      min-height:250px;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:2px 0 18px;
      pointer-events:none;
    }

    .hero-glow,
    .hero-ring,
    .hero-core{
      position:absolute;
      border-radius:50%;
    }

    .hero-glow{
      width:62vmin;
      height:62vmin;
      max-width:340px;
      max-height:340px;
      background:
        radial-gradient(circle, rgba(210,232,255,.22) 0%, rgba(170,210,255,.08) 35%, transparent 70%);
      filter:blur(30px);
      opacity:.72;
      animation:breathe 7s ease-in-out infinite;
    }

    .hero-ring{
      width:56vmin;
      height:56vmin;
      max-width:305px;
      max-height:305px;
      border:1px solid rgba(255,255,255,.08);
      box-shadow:
        inset 0 0 30px rgba(255,255,255,.03),
        0 0 50px rgba(160,210,255,.06);
      opacity:.5;
    }

    .hero-core{
      width:14px;
      height:14px;
      background:
        radial-gradient(circle, #fff 0%, rgba(255,255,255,.85) 38%, rgba(165,212,255,.3) 72%, transparent 100%);
      box-shadow:0 0 26px rgba(210,235,255,.48);
    }

    .section{
      margin-top:18px;
    }

    .section-title{
      margin:0 0 14px;
      font-size:14px;
      font-weight:700;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .chips{
      display:flex;
      gap:10px;
      overflow:auto;
      padding-bottom:2px;
      scrollbar-width:none;
    }

    .chips::-webkit-scrollbar{
      display:none;
    }

    .chip{
      flex:0 0 auto;
      border:none;
      border-radius:999px;
      padding:17px 20px;
      white-space:nowrap;
      color:rgba(255,255,255,.88);
      font-size:18px;
      font-weight:500;
      line-height:1;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.08);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.10),
        0 12px 28px rgba(0,0,0,.28);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      transition:.24s ease;
    }

    .chip.active{
      color:#fff;
      border-color:rgba(216,235,255,.34);
      background:
        linear-gradient(180deg, rgba(186,221,255,.22), rgba(255,255,255,.06));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.14),
        0 0 0 1px rgba(255,255,255,.05),
        0 0 24px rgba(170,215,255,.15),
        0 14px 30px rgba(0,0,0,.34);
    }

    .panel{
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.035));
      border:1px solid var(--line);
      border-radius:28px;
      backdrop-filter:blur(24px);
      -webkit-backdrop-filter:blur(24px);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .vault{
      padding:14px;
    }

    .load-button{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      padding:18px;
      border-radius:22px;
      border:1px solid rgba(255,255,255,.08);
      background:
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
      color:rgba(255,255,255,.94);
      font-size:18px;
      font-weight:500;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.08),
        0 14px 28px rgba(0,0,0,.20);
      cursor:pointer;
    }

    #fileInput{
      display:none;
    }

    .playlist{
      margin-top:14px;
      display:flex;
      flex-direction:column;
      gap:8px;
      max-height:320px;
      overflow:auto;
      scrollbar-width:none;
    }

    .playlist::-webkit-scrollbar{
      display:none;
    }

    .track{
      display:grid;
      grid-template-columns:56px 1fr 28px;
      gap:12px;
      align-items:center;
      width:100%;
      border:none;
      background:transparent;
      color:inherit;
      text-align:left;
      padding:8px;
      border-radius:18px;
      transition:.22s ease;
      cursor:pointer;
    }

    .track:hover,
    .track:active{
      background:rgba(255,255,255,.04);
    }

    .track.active{
      background:rgba(255,255,255,.06);
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.06);
    }

    .cover{
      width:56px;
      height:56px;
      border-radius:16px;
      overflow:hidden;
      position:relative;
      border:1px solid rgba(255,255,255,.08);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
    }

    .cover::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 28% 28%, rgba(255,255,255,.24), transparent 18%),
        radial-gradient(circle at 72% 26%, rgba(160,208,255,.18), transparent 22%),
        radial-gradient(circle at 46% 76%, rgba(192,176,255,.16), transparent 18%),
        linear-gradient(135deg, rgba(8,16,30,.96), rgba(6,6,10,.98));
    }

    .cover::after{
      content:"";
      position:absolute;
      inset:10px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.14);
      opacity:.55;
    }

    .track-meta{
      min-width:0;
    }

    .track-title{
      font-size:17px;
      color:rgba(255,255,255,.95);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      margin-bottom:4px;
    }

    .track-sub{
      font-size:14px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .track-indicator{
      width:18px;
      height:18px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.14);
      position:relative;
      opacity:.8;
    }

    .track.active .track-indicator::before{
      content:"";
      position:absolute;
      inset:4px;
      border-radius:50%;
      background:rgba(228,240,255,.98);
      box-shadow:0 0 14px rgba(180,220,255,.45);
    }

    .empty{
      padding:18px 8px 4px;
      color:var(--muted);
      font-size:15px;
      line-height:1.5;
    }

    .player{
      position:fixed;
      left:14px;
      right:14px;
      bottom:calc(12px + var(--safe-bottom));
      z-index:6;
      padding:14px 14px 12px;
      border-radius:30px;
      background:
        linear-gradient(180deg, rgba(12,12,14,.72), rgba(10,10,12,.62));
      border:1px solid rgba(255,255,255,.10);
      backdrop-filter:blur(26px) saturate(1.15);
      -webkit-backdrop-filter:blur(26px) saturate(1.15);
      box-shadow:
        0 20px 60px rgba(0,0,0,.44),
        inset 0 1px 0 rgba(255,255,255,.08);
    }

    .player-top{
      display:grid;
      grid-template-columns:1fr auto;
      align-items:center;
      gap:14px;
      margin-bottom:12px;
    }

    .now{
      min-width:0;
    }

    .now-title{
      font-size:25px;
      line-height:1.04;
      letter-spacing:-.03em;
      color:#fff;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      margin-bottom:5px;
    }

    .now-sub{
      font-size:15px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .level{
      width:26px;
      height:26px;
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:3px;
      opacity:.8;
    }

    .level span{
      display:block;
      width:4px;
      border-radius:3px;
      background:rgba(255,255,255,.82);
      animation:levelMove 1.2s ease-in-out infinite;
      transform-origin:bottom;
    }

    .level span:nth-child(1){height:8px;animation-delay:0s}
    .level span:nth-child(2){height:14px;animation-delay:.15s}
    .level span:nth-child(3){height:18px;animation-delay:.3s}
    .level span:nth-child(4){height:12px;animation-delay:.45s}

    .controls{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:16px;
      margin:2px 0 12px;
    }

    .ctrl{
      appearance:none;
      border:none;
      color:#fff;
      display:grid;
      place-items:center;
      border-radius:50%;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.08),
        0 10px 24px rgba(0,0,0,.26);
      transition:.24s ease;
      cursor:pointer;
    }

    .ctrl:active{
      transform:scale(.96);
    }

    .ctrl.sm{
      width:54px;
      height:54px;
    }

    .ctrl.lg{
      width:78px;
      height:78px;
      background:
        radial-gradient(circle at 32% 24%, rgba(255,255,255,.16), rgba(255,255,255,.04)),
        linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.03));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.16),
        0 0 0 1px rgba(255,255,255,.05),
        0 10px 28px rgba(0,0,0,.30),
        0 0 28px rgba(170,215,255,.10);
    }

    .progress-wrap{
      display:grid;
      grid-template-columns:auto 1fr auto;
      gap:12px;
      align-items:center;
    }

    .time{
      font-size:13px;
      color:var(--muted);
      min-width:38px;
      text-align:center;
      font-variant-numeric:tabular-nums;
    }

    input[type="range"]{
      -webkit-appearance:none;
      appearance:none;
      width:100%;
      background:transparent;
      height:28px;
      margin:0;
    }

    input[type="range"]::-webkit-slider-runnable-track{
      height:4px;
      border-radius:999px;
      background:
        linear-gradient(
          90deg,
          rgba(255,255,255,.92) 0 var(--fill,0%),
          rgba(255,255,255,.18) var(--fill,0%) 100%
        );
    }

    input[type="range"]::-moz-range-track{
      height:4px;
      border-radius:999px;
      background:rgba(255,255,255,.18);
    }

    input[type="range"]::-webkit-slider-thumb{
      -webkit-appearance:none;
      appearance:none;
      width:18px;
      height:18px;
      border-radius:50%;
      background:#fff;
      border:none;
      margin-top:-7px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,.22),
        0 4px 14px rgba(0,0,0,.34);
    }

    input[type="range"]::-moz-range-thumb{
      width:18px;
      height:18px;
      border-radius:50%;
      background:#fff;
      border:none;
      box-shadow:0 4px 14px rgba(0,0,0,.34);
    }

    .status{
      margin-top:12px;
      min-height:18px;
      font-size:13px;
      color:var(--soft);
      text-align:center;
      opacity:.92;
    }

    .live{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      font-size:12px;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:rgba(255,255,255,.84);
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
    }

    .live-dot{
      width:7px;
      height:7px;
      border-radius:50%;
      background:#fff;
      box-shadow:0 0 10px rgba(255,255,255,.55);
      animation:pulse 1.5s ease-in-out infinite;
    }

    .hidden{
      display:none !important;
    }

    @keyframes pulse{
      0%,100%{transform:scale(1);opacity:.8}
      50%{transform:scale(1.35);opacity:1}
    }

    @keyframes breathe{
      0%,100%{transform:scale(.96);opacity:.52}
      50%{transform:scale(1.06);opacity:.78}
    }

    @keyframes levelMove{
      0%,100%{transform:scaleY(.55);opacity:.45}
      50%{transform:scaleY(1);opacity:.95}
    }

    @media (min-width:720px){
      .app{
        max-width:460px;
        margin:0 auto;
        border-left:1px solid rgba(255,255,255,.04);
        border-right:1px solid rgba(255,255,255,.04);
        box-shadow:0 0 80px rgba(0,0,0,.35);
      }

      .player{
        max-width:432px;
        left:50%;
        right:auto;
        width:calc(100% - 28px);
        transform:translateX(-50%);
      }
    }
  </style>
</head>

          </svg>
        </button>

        <button class="ctrl sm" id="nextBtn" aria-label="Следующий">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M16 6v12M6 7l8 5-8 5V7Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>

      <div class="progress-wrap">

    const progress = document.getElementById("progress");
    const nowTitle = document.getElementById("nowTitle");
    const nowSub = document.getElementById("nowSub");
    const curTime = document.getElementById("curTime");
    const durTime = document.getElementById("durTime");
    const statusEl = document.getElementById("status");
    const liveWrap = document.getElementById("liveWrap");
    const playIcon = document.getElementById("playIcon");
    const level = document.getElementById("level");

    const canvas = document.getElementById("bgCanvas");
    const ctx = canvas.getContext("2d", { alpha:true });

    let localTracks = [...BUNDLED_TRACKS];
    let currentMode = "local";
    let currentIndex = 0;
    let currentStation = null;
    let streamAttempt = 0;

    let objectUrls = [];
    let audioCtx = null;
    let analyser = null;
    let spectrum = null;
    let sourceNode = null;
    let usingRealAnalyser = false;
    let fakeEnergy = 0.18;
    let progressRAF = null;

    const particles = Array.from({ length: 180 }, (_, i) => ({
      a: (Math.PI * 2 * i) / 180,
      r: 0.3 + Math.random() * 0.7,
      o: 0.14 + Math.random() * 0.58,
      s: 0.5 + Math.random() * 1.8,
      d: Math.random() * Math.PI * 2
    }));

    function createManifestAndSW(){
      const iconSVG = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
          <defs>
            <radialGradient id="g" cx="50%" cy="42%" r="72%">
              <stop offset="0%" stop-color="#f7fbff"/>
              <stop offset="28%" stop-color="#bedfff"/>
              <stop offset="58%" stop-color="#182333"/>
              <stop offset="100%" stop-color="#050505"/>
            </radialGradient>
          </defs>
          <rect width="512" height="512" rx="110" fill="#050505"/>
          <circle cx="256" cy="256" r="155" fill="url(#g)" opacity=".95"/>
          <circle cx="256" cy="256" r="118" fill="none" stroke="rgba(255,255,255,.26)" stroke-width="2"/>
          <circle cx="256" cy="256" r="76" fill="none" stroke="rgba(255,255,255,.34)" stroke-width="2"/>
          <circle cx="256" cy="256" r="6" fill="#fff"/>
        </svg>
      `;

      const iconURL = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(iconSVG);

      const manifest = {
        name: APP_NAME,
        short_name: APP_NAME,
        start_url: "./",
        display: "standalone",
        background_color: "#050505",
        theme_color: "#050505",
        icons: [
          { src: iconURL, sizes: "192x192", type: "image/svg+xml", purpose: "any" },
          { src: iconURL, sizes: "512x512", type: "image/svg+xml", purpose: "any" }
        ]
      };

      const manifestBlob = new Blob([JSON.stringify(manifest)], { type:"application/manifest+json" });
      const manifestURL = URL.createObjectURL(manifestBlob);
      const link = document.createElement("link");
      link.rel = "manifest";
      link.href = manifestURL;
      document.head.appendChild(link);

      if ("serviceWorker" in navigator && location.protocol !== "file:") {
        const swCode = `
          const CACHE = 'resonance-v3';
          self.addEventListener('install', (e) => {
            self.skipWaiting();
            e.waitUntil(caches.open(CACHE).then(cache => cache.addAll(['./']).catch(()=>{})));
          });
          self.addEventListener('activate', (e) => {
            e.waitUntil(self.clients.claim());
          });
          self.addEventListener('fetch', (e) => {
            if (e.request.method !== 'GET') return;
            e.respondWith(
              caches.match(e.request).then((cached) => {
                return cached || fetch(e.request).then((res) => {
                  const copy = res.clone();
                  caches.open(CACHE).then(cache => cache.put(e.request, copy)).catch(()=>{});
                  return res;
                }).catch(() => cached);
              })
            );
          });
        `;
        const swBlob = new Blob([swCode], { type:"text/javascript" });
        const swURL = URL.createObjectURL(swBlob);
        navigator.serviceWorker.register(swURL).catch(() => {});
      }
    }

    function escapeHtml(text){
      return String(text).replace(/[&<>"']/g, (m) => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#039;"
      }[m]));
    }

    function formatTime(sec){
      if (!isFinite(sec) || sec < 0) return "0:00";
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      return `${m}:${String(s).padStart(2, "0")}`;
    }

    function setStatus(text = ""){
      statusEl.textContent = text;
    }

    function setRangeFill(input){
      const min = Number(input.min || 0);
      const max = Number(input.max || 100);
      const val = Number(input.value || 0);
      const fill = ((val - min) * 100) / (max - min || 1);
      input.style.setProperty("--fill", `${fill}%`);
    }

    function setPlayIcon(paused){
      playIcon.innerHTML = paused
        ? '<path d="M9 6.7v10.6c0 .7.8 1.14 1.4.78l7.9-5.3a.93.93 0 0 0 0-1.56l-7.9-5.3A.93.93 0 0 0 9 6.7Z" fill="currentColor"/>'
        : '<path d="M8 6.5v11M16 6.5v11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>';
    }

    function setLiveUI(isLive){
      liveWrap.classList.toggle("hidden", !isLive);
      progress.disabled = isLive;

      if (isLive) {
        progress.value = 0;
        setRangeFill(progress);
        curTime.textContent = "LIVE";
        durTime.textContent = "";
      }
    }

    function updateNowPlaying(title, sub){
      nowTitle.textContent = title || APP_NAME;
      nowSub.textContent = sub || "";
      document.title = `${title || APP_NAME} — ${APP_NAME}`;
      updateMediaSession();
    }

    function clearActiveVibes(){
      document.querySelectorAll(".chip").forEach(btn => btn.classList.remove("active"));
    }

    function setActiveVibe(stationId){
      clearActiveVibes();
      const btn = document.querySelector(`[data-station-id="${CSS.escape(stationId)}"]`);
      if (btn) btn.classList.add("active");
    }

    function createVibes(){
      vibesEl.innerHTML = "";
      STATIONS.forEach((station) => {
        const btn = document.createElement("button");
        btn.className = "chip";
        btn.dataset.stationId = station.id;
        btn.textContent = station.label;
        btn.addEventListener("click", () => handleVibePress(station));
        vibesEl.appendChild(btn);
      });
    }

    async function handleVibePress(station){
      currentStation = station;
      setActiveVibe(station.id);

      if (station.mode === "bundled") {
        await playLocalTrack(station.targetIndex || 0);
        return;
      }

      await playStreamStation(station);
    }

    function coverStyle(seed = 0){
      const palettes = [
        ["#0b0f18","#1c2744","#7bb8ff"],
        ["#080b12","#1a1d32","#d0d8ff"],
        ["#0b1118","#132430","#8cdcff"],
        ["#09090c","#17172a","#e5f0ff"],
        ["#060b11","#10192e","#9bc6ff"]
      ];
      const [a,b,c] = palettes[seed % palettes.length];
      return `radial-gradient(circle at 72% 26%, ${c}55, transparent 22%), linear-gradient(135deg, ${a}, ${b})`;
    }

    function renderPlaylist(){
      playlistEl.innerHTML = "";

      if (!localTracks.length){
        emptyText.classList.remove("hidden");
        return;
      }

      emptyText.classList.add("hidden");

      localTracks.forEach((track, index) => {
        const btn = document.createElement("button");
        btn.className = "track" + (currentMode === "local" && currentIndex === index ? " active" : "");
        btn.innerHTML = `
          <div class="cover" style="background:${coverStyle(index)}"></div>
          <div class="track-meta">
            <div class="track-title">${escapeHtml(track.title)}</div>
            <div class="track-sub">${escapeHtml(track.artist || "Локальный файл")}</div>
          </div>
          <div class="track-indicator"></div>
        `;
        btn.addEventListener("click", () => playLocalTrack(index));
        playlistEl.appendChild(btn);
      });
    }

    function fileNameToMeta(fileName){
      const clean = fileName.replace(/\.[^/.]+$/, "");
      const parts = clean.split(" - ");

      if (parts.length >= 2) {
        return {
          artist: parts[0].trim(),
          title: parts.slice(1).join(" - ").trim()
        };
      }

      return {
        artist: "Локальный файл",
        title: clean.trim()
      };
    }

    function cleanupObjectURLs(){
      objectUrls.forEach(url => URL.revokeObjectURL(url));
      objectUrls = [];
    }

    fileInput.addEventListener("change", async (e) => {
      const files = Array.from(e.target.files || []).filter(f => f.type.startsWith("audio/"));
      if (!files.length) return;

      cleanupObjectURLs();

      const uploadedTracks = files.map((file, index) => {
        const meta = fileNameToMeta(file.name);
        const url = URL.createObjectURL(file);
        objectUrls.push(url);
        return {
          id: `upload-${Date.now()}-${index}`,
          type: "upload",
          url,
          title: meta.title,
          artist: meta.artist
        };
      });

      localTracks = [...uploadedTracks, ...BUNDLED_TRACKS];
      renderPlaylist();
      await playLocalTrack(0);
    });

    async function ensureAudioContext(){
      if (!audioCtx){
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return;

        audioCtx = new AudioCtx();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 1024;
        analyser.smoothingTimeConstant = 0.88;
        spectrum = new Uint8Array(analyser.frequencyBinCount);

        try{
          audio.crossOrigin = "anonymous";
          sourceNode = audioCtx.createMediaElementSource(audio);
          sourceNode.connect(analyser);
          analyser.connect(audioCtx.destination);
          usingRealAnalyser = true;
        }catch(err){
          usingRealAnalyser = false;
        }
      }

      if (audioCtx && audioCtx.state === "suspended") {
        try { await audioCtx.resume(); } catch(e){}
      }
    }

    async function safePlay(){
      try{
        await ensureAudioContext();
        await audio.play();
        setStatus("");
      }catch(err){
        setStatus("Нажми ещё раз, чтобы запустить воспроизведение");
      }
    }

    async function playLocalTrack(index){
      if (!localTracks[index]) return;

      currentMode = "local";
      currentIndex = index;
      streamAttempt = 0;

      const track = localTracks[index];
      audio.src = track.url;
      audio.load();

      setLiveUI(false);
      renderPlaylist();
      updateNowPlaying(track.title, track.artist || "Локальный файл");
      setStatus("");

      await safePlay();
    }

    async function playStreamStation(station){
      if (!station || !station.urls || !station.urls.length) return;

      currentMode = "stream";
      currentIndex = -1;
      streamAttempt = 0;

      const url = station.urls[streamAttempt];
      audio.src = url;
      audio.load();

      setLiveUI(true);
      renderPlaylist();
      updateNowPlaying(station.label, station.sub || "Радио");
      setStatus("Подключаем поток…");

      await safePlay();
    }

    async function retryNextStream(){
      if (!currentStation || currentStation.mode !== "stream") return;
      streamAttempt += 1;

      if (streamAttempt >= currentStation.urls.length){
        setStatus("Поток сейчас недоступен. Попробуй другое настроение.");
        return;
      }

      audio.src = currentStation.urls[streamAttempt];
      audio.load();
      setStatus("Пробуем резервный поток…");
      await safePlay();
    }

    async function togglePlay(){
      if (!audio.src) {
        await playLocalTrack(0);
        return;
      }

      if (audio.paused) {
        await safePlay();
      } else {
        audio.pause();
      }
    }

    async function nextTrack(){
      if (currentMode === "local" && localTracks.length){
        const next = (currentIndex + 1) % localTracks.length;
        await playLocalTrack(next);
        return;
      }

      if (currentMode === "stream"){
        const idx = STATIONS.findIndex(s => s.id === currentStation?.id);
        const nextStation = STATIONS[(idx + 1 + STATIONS.length) % STATIONS.length];
        await handleVibePress(nextStation);
      }
    }

    async function prevTrack(){
      if (currentMode === "local" && localTracks.length){
        const prev = (currentIndex - 1 + localTracks.length) % localTracks.length;
        await playLocalTrack(prev);
        return;
      }

      if (currentMode === "stream"){
        const idx = STATIONS.findIndex(s => s.id === currentStation?.id);
        const prevStation = STATIONS[(idx - 1 + STATIONS.length) % STATIONS.length];
        await handleVibePress(prevStation);
      }
    }

    playBtn.addEventListener("click", togglePlay);
    nextBtn.addEventListener("click", nextTrack);
    prevBtn.addEventListener("click", prevTrack);

    progress.addEventListener("input", () => {
      setRangeFill(progress);
      if (currentMode === "local" && isFinite(audio.duration)) {
        const previewTime = (Number(progress.value) / 100) * audio.duration;
        curTime.textContent = formatTime(previewTime);
      }
    });

    progress.addEventListener("change", () => {
      if (currentMode === "local" && isFinite(audio.duration)) {
        audio.currentTime = (Number(progress.value) / 100) * audio.duration;
      }
    });

    audio.addEventListener("play", () => {
      setPlayIcon(false);
      level.style.opacity = "1";
      updateMediaSessionPlayback();
    });

    audio.addEventListener("pause", () => {
      setPlayIcon(true);
      level.style.opacity = ".58";
      updateMediaSessionPlayback();
    });

    audio.addEventListener("loadedmetadata", () => {
      if (currentMode === "local") {
        durTime.textContent = formatTime(audio.duration);
      }
    });

    audio.addEventListener("timeupdate", () => {
      if (currentMode !== "local" || !isFinite(audio.duration)) return;

      curTime.textContent = formatTime(audio.currentTime);
      durTime.textContent = formatTime(audio.duration);
      progress.value = String((audio.currentTime / audio.duration) * 100 || 0);
      setRangeFill(progress);
      updateMediaPositionState();
    });

    audio.addEventListener("ended", async () => {
      if (currentMode === "local") {
        await nextTrack();
      }
    });

    audio.addEventListener("error", async () => {
      if (currentMode === "stream") {
        await retryNextStream();
      } else {
        setStatus("Не удалось воспроизвести трек");
      }
    });

    audio.addEventListener("waiting", () => {
      if (!audio.paused) {
        setStatus(currentMode === "stream" ? "Буферизация потока…" : "Загрузка…");
      }
    });

    audio.addEventListener("playing", () => {
      setStatus("");
    });

    function createArtworkDataURL(text){
      const safe = String(text || APP_NAME).slice(0, 22);
      return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
          <defs>
            <radialGradient id="g" cx="50%" cy="42%" r="72%">
              <stop offset="0%" stop-color="#f9fdff"/>
              <stop offset="24%" stop-color="#cde5ff"/>
              <stop offset="57%" stop-color="#172335"/>
              <stop offset="100%" stop-color="#050505"/>
            </radialGradient>
          </defs>
          <rect width="512" height="512" rx="96" fill="#050505"/>
          <circle cx="256" cy="232" r="150" fill="url(#g)"/>
          <circle cx="256" cy="232" r="105" fill="none" stroke="rgba(255,255,255,.24)" stroke-width="2"/>
          <circle cx="256" cy="232" r="64" fill="none" stroke="rgba(255,255,255,.28)" stroke-width="2"/>
          <circle cx="256" cy="232" r="6" fill="#fff"/>
          <text x="256" y="430" text-anchor="middle" fill="rgba(255,255,255,.88)" font-family="Arial, Helvetica, sans-serif" font-size="28" letter-spacing="5">${safe}</text>
        </svg>
      `);
    }

    function updateMediaSession(){
      if (!("mediaSession" in navigator)) return;

      navigator.mediaSession.metadata = new MediaMetadata({
        title: nowTitle.textContent || APP_NAME,
        artist: nowSub.textContent || "",
        album: APP_NAME,
        artwork: [{
          src: createArtworkDataURL(nowTitle.textContent || APP_NAME),
          sizes: "512x512",
          type: "image/svg+xml"
        }]
      });

      navigator.mediaSession.setActionHandler("play", async () => { await safePlay(); });
      navigator.mediaSession.setActionHandler("pause", () => audio.pause());
      navigator.mediaSession.setActionHandler("nexttrack", () => nextTrack());
      navigator.mediaSession.setActionHandler("previoustrack", () => prevTrack());

      navigator.mediaSession.setActionHandler(
        "seekbackward",
        currentMode === "local"
          ? () => { audio.currentTime = Math.max(0, audio.currentTime - 10); }
          : null
      );

      navigator.mediaSession.setActionHandler(
        "seekforward",
        currentMode === "local"
          ? () => { audio.currentTime = Math.min(audio.duration || audio.currentTime + 10, audio.currentTime + 10); }
          : null
      );

      navigator.mediaSession.setActionHandler(
        "seekto",
        currentMode === "local"
          ? (details) => {
              if (details.fastSeek && "fastSeek" in audio) audio.fastSeek(details.seekTime);
              else audio.currentTime = details.seekTime;
            }
          : null
      );

      updateMediaSessionPlayback();
      updateMediaPositionState();
    }

    function updateMediaSessionPlayback(){
      if ("mediaSession" in navigator) {
        navigator.mediaSession.playbackState = audio.paused ? "paused" : "playing";
      }
    }

    function updateMediaPositionState(){
      if (!("mediaSession" in navigator)) return;
      if (currentMode !== "local" || !isFinite(audio.duration)) return;

      try{
        navigator.mediaSession.setPositionState({
          duration: audio.duration,
          playbackRate: audio.playbackRate || 1,
          position: audio.currentTime
        });
      }catch(e){}
    }

    function startProgressLoop(){
      cancelAnimationFrame(progressRAF);

      const tick = () => {
        if (currentMode === "local" && !audio.paused && isFinite(audio.duration)) {
          curTime.textContent = formatTime(audio.currentTime);
          durTime.textContent = formatTime(audio.duration);
          progress.value = String((audio.currentTime / audio.duration) * 100 || 0);
          setRangeFill(progress);
        }
        progressRAF = requestAnimationFrame(tick);
      };

      tick();
    }

    function resizeCanvas(){
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.floor(innerWidth * dpr);
      canvas.height = Math.floor(innerHeight * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    function getSpectrum(){
      if (usingRealAnalyser && analyser && spectrum){
        try{
          analyser.getByteFrequencyData(spectrum);
          return spectrum;
        }catch(e){}
      }
      return null;
    }

    function getEnergy(){
      const arr = getSpectrum();

      if (arr){
        let bass = 0, mid = 0, high = 0;
        const len = arr.length;
        const bassEnd = Math.floor(len * 0.08);
        const midEnd = Math.floor(len * 0.35);

        for (let i = 0; i < bassEnd; i++) bass += arr[i];
        for (let i = bassEnd; i < midEnd; i++) mid += arr[i];
        for (let i = midEnd; i < len; i++) high += arr[i];

        bass /= Math.max(1, bassEnd * 255);
        mid /= Math.max(1, (midEnd - bassEnd) * 255);
        high /= Math.max(1, (len - midEnd) * 255);

        return {
          bass: bass || 0.02,
          mid: mid || 0.02,
          high: high || 0.02,
          overall: (bass * 1.35 + mid + high * .8) / 3.15
        };
      }

      const t = performance.now() * 0.001;
      const playBoost = !audio.paused && audio.src ? 1 : 0;
      fakeEnergy += (((0.16 + Math.sin(t * 1.2) * 0.05 + Math.sin(t * 2.7) * 0.03) + playBoost * 0.12) - fakeEnergy) * 0.05;

      return {
        bass: Math.max(0.05, fakeEnergy + Math.sin(t * 1.7) * 0.04),
        mid: Math.max(0.05, fakeEnergy * 0.8 + Math.sin(t * 2.1) * 0.05),
        high: Math.max(0.05, fakeEnergy * 0.55 + Math.cos(t * 2.9) * 0.04),
        overall: Math.max(0.05, fakeEnergy)
      };
    }

    function drawBackground(time){
      const t = time * 0.001;
      const w = innerWidth;
      const h = innerHeight;
      ctx.clearRect(0, 0, w, h);

      const e = getEnergy();
      const cx = w * 0.5;
      const cy = h * 0.27;
      const bass = e.bass;
      const mid = e.mid;
      const high = e.high;
      const overall = e.overall;
      const baseR = Math.min(w, h) * 0.18;
      const glowR = baseR * (1.8 + bass * 1.45);

      const bgGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(w, h) * 0.9);
      bgGrad.addColorStop(0, `rgba(${Math.floor(162 + bass * 65)}, ${Math.floor(194 + mid * 34)}, 255, ${0.06 + overall * 0.18})`);
      bgGrad.addColorStop(.18, `rgba(110,150,255,${0.05 + overall * 0.10})`);
      bgGrad.addColorStop(.55, `rgba(20,26,42,.08)`);
      bgGrad.addColorStop(1, `rgba(5,5,5,1)`);
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, w, h);

      for (let i = 0; i < 36; i++){
        const x = (Math.sin(i * 91.77 + t * .03) * .5 + .5) * w;
        const y = (Math.cos(i * 57.11 + t * .02) * .5 + .5) * h;
        const r = 0.6 + ((i * 7) % 4) * 0.35;
        ctx.beginPath();
        ctx.fillStyle = `rgba(255,255,255,${0.015 + ((i % 6) / 6) * 0.05})`;
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }

      const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowR);
      glow.addColorStop(0, `rgba(255,255,255,${0.16 + overall * 0.18})`);
      glow.addColorStop(.2, `rgba(170,210,255,${0.12 + mid * 0.12})`);
      glow.addColorStop(.5, `rgba(95,135,255,${0.06 + high * 0.08})`);
      glow.addColorStop(1, `rgba(95,135,255,0)`);
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(cx, cy, glowR, 0, Math.PI * 2);
      ctx.fill();

      ctx.save();
      ctx.translate(cx, cy);

      for (let layer = 0; layer < 4; layer++){
        ctx.beginPath();
        const alpha = 0.045 + layer * 0.018 + overall * 0.03;
        const phase = t * (0.12 + layer * 0.05);

        for (let i = 0; i <= 220; i++){
          const a = (i / 220) * Math.PI * 2;
          const noise =
            Math.sin(a * (3 + layer) + phase * 1.4) * bass * 18 +
            Math.cos(a * (7 + layer * 1.3) - phase * 1.8) * high * 10 +
            Math.sin(a * 11 + phase * 2.2) * mid * 7;

          const r = baseR + layer * 7 + noise;
          const x = Math.cos(a) * r;
          const y = Math.sin(a) * r * (0.88 + layer * 0.02);

          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }

        ctx.closePath();
        ctx.strokeStyle = `rgba(235,244,255,${alpha})`;
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      particles.forEach((p, i) => {
        const phase = t * (0.2 + p.s * 0.09) + p.d;
        const wave = Math.sin(phase * 1.6 + p.a * 2.8) * (12 + high * 28);
        const radial = baseR * (0.55 + p.r * 0.72) + wave + bass * 14;
        const twist = t * (0.06 + p.s * 0.012);
        const x = Math.cos(p.a + twist) * radial;
        const y = Math.sin(p.a + twist) * radial * (0.9 + Math.sin(phase) * 0.04);
        const size = 0.8 + p.s * 0.85 + overall * 1.2;
        const alpha = p.o * (0.45 + overall * 0.95);

        ctx.beginPath();
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fill();

        if (i % 3 === 0){
          const x2 = x * .72;
          const y2 = y * .72;
          ctx.beginPath();
          ctx.moveTo(x, y);
          ctx.lineTo(x2, y2);
          ctx.strokeStyle = `rgba(220,235,255,${alpha * 0.35})`;
          ctx.lineWidth = .75;
          ctx.stroke();
        }
      });

      const core = ctx.createRadialGradient(0, 0, 0, 0, 0, baseR * .28);
      core.addColorStop(0, `rgba(255,255,255,.95)`);
      core.addColorStop(.25, `rgba(245,250,255,${0.55 + overall * .25})`);
      core.addColorStop(.6, `rgba(190,220,255,${0.20 + bass * .15})`);
      core.addColorStop(1, `rgba(190,220,255,0)`);
      ctx.fillStyle = core;
      ctx.beginPath();
      ctx.arc(0, 0, baseR * .28, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
      requestAnimationFrame(drawBackground);
    }

    function initWarmup(){
      ["touchstart", "click"].forEach((evt) => {
        window.addEventListener(evt, async () => {
          if (!audioCtx) {
            try { await ensureAudioContext(); } catch(e){}
          }
        }, { once:true, passive:true });
      });
    }

    function init(){
      createManifestAndSW();
      createVibes();
      renderPlaylist();
      setPlayIcon(true);
      setRangeFill(progress);
      setLiveUI(false);
      startProgressLoop();
      initWarmup();
      requestAnimationFrame(drawBackground);
      updateNowPlaying(localTracks[0].title, localTracks[0].artist);
      setActiveVibe("lofi");
      currentStation = STATIONS[0];
      setStatus("Готов к запуску");
    }

    init();
  </script>
